name: Build and Push Ubuntu Image

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".github/workflows/build-push.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build and push amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: joelkim/ubuntu:${{ steps.tag.outputs.TAG }}-amd64

      - name: Build and push arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: joelkim/ubuntu:${{ steps.tag.outputs.TAG }}-arm64

      - name: Create and push multi-arch manifests
        run: |
          docker buildx imagetools create \
            -t joelkim/ubuntu:${{ steps.tag.outputs.TAG }} \
            joelkim/ubuntu:${{ steps.tag.outputs.TAG }}-amd64 \
            joelkim/ubuntu:${{ steps.tag.outputs.TAG }}-arm64

          docker buildx imagetools create \
            -t joelkim/ubuntu:latest \
            joelkim/ubuntu:${{ steps.tag.outputs.TAG }}-amd64 \
            joelkim/ubuntu:${{ steps.tag.outputs.TAG }}-arm64
